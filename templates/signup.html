<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>注册</title>
<link rel="stylesheet" type="text/css" href="/static/css/style.css" />
<script src="/static/javascript/jquery.js"></script>
<script src="/static/javascript/public.js"></script>
<script src="/static/javascript/plug-ins/customScrollbar.min.js"></script>
</head>
<body class="login-page">
	<section class="login-contain">
		<header>
			<h1>注册页面</h1>
		</header>
		<div class="form-content">
		<form class="login-form" action="/signup" method="post">
			<ul>
				<li>
					<div class="form-group">
						<label class="control-label">账号：</label>
						<input type="text" name="name" placeholder="账号..." class="form-control form-underlined"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">邮箱：</label>
						<div style="display:flex;gap:8px;align-items:center;">
							<input type="email" name="email" id="emailInput" placeholder="邮箱..." class="form-control form-underlined" style="flex:1;"/>
							<button type="button" id="sendCodeBtn"
								style="white-space:nowrap;padding:6px 12px;background:#4a90e2;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;">
								发送验证码
							</button>
						</div>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">验证码：</label>
						<input type="text" name="code" placeholder="6位验证码..." class="form-control form-underlined" maxlength="6"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">密码：</label>
						<input type="password" name="pwd" placeholder="密码（至少6位）..." class="form-control form-underlined"/>
					</div>
				</li>
				{% if error %}
				<li>
					<p style="color:#e85d5d;text-align:center;font-size:14px;">{{ error }}</p>
				</li>
				{% endif %}
				<li>
					<button class="btn btn-lg btn-block" type="submit">立即注册</button>
				</li>
				<li>
					<p class="btm-info"><a href="/login">去登录</a></p>
				</li>
			</ul>
		</form>
		</div>
	</section>
<div class="mask"></div>
<script>
var countdown = 0;
document.getElementById('sendCodeBtn').addEventListener('click', function() {
    var email = document.getElementById('emailInput').value.trim();
    if (!email) { alert('请先填写邮箱'); return; }
    if (countdown > 0) return;
    var btn = this;
    btn.disabled = true;
    btn.style.background = '#aaa';
    $.ajax({
        url: '/send_code',
        type: 'POST',
        data: { email: email },
        success: function(res) {
            if (res.ok) {
                countdown = 60;
                var timer = setInterval(function() {
                    countdown--;
                    btn.textContent = countdown + 's后重发';
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.style.background = '#4a90e2';
                        btn.textContent = '发送验证码';
                    }
                }, 1000);
            } else {
                alert(res.msg);
                btn.disabled = false;
                btn.style.background = '#4a90e2';
            }
        }
    });
});
</script>
</body>
</html>
