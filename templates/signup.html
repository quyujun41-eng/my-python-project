<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>注册</title>
<link rel="stylesheet" type="text/css" href="/static/css/style.css" />
<script src="/static/javascript/jquery.js"></script>
</head>
<body class="login-page">
	<section class="login-contain">
		<header>
			<h1>注册页面</h1>
		</header>
		<div class="form-content">
		<form class="login-form" action="/signup" method="post">
			<ul>
				<li>
					<div class="form-group">
						<label class="control-label">账号：</label>
						<input type="text" name="name" placeholder="账号..." class="form-control form-underlined"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">邮箱：</label>
						<input type="email" name="email" placeholder="邮箱..." class="form-control form-underlined"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">密码：</label>
						<input type="password" name="pwd" placeholder="密码（至少6位）..." class="form-control form-underlined"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">验证码：</label>
						<div style="display:flex;gap:8px;align-items:center;">
							<input type="text" name="code" placeholder="请输入右侧验证码..." class="form-control form-underlined" maxlength="4" style="flex:1;"/>
							<img id="captchaImg" src="/captcha.png" style="height:38px;border-radius:4px;cursor:pointer;" title="点击刷新"/>
						</div>
					</div>
				</li>
				{% if error %}
				<li>
					<p style="color:#e85d5d;text-align:center;font-size:14px;">{{ error }}</p>
				</li>
				{% endif %}
				<li>
					<button class="btn btn-lg btn-block" type="submit">立即注册</button>
				</li>
				<li>
					<p class="btm-info"><a href="/login">去登录</a></p>
				</li>
			</ul>
		</form>
		</div>
	</section>
<div class="mask"></div>
<script>
document.getElementById('captchaImg').addEventListener('click', function() {
    this.src = '/captcha.png?' + Date.now();
});
</script>
</body>
</html>
