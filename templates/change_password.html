<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>修改密码</title>
<link rel="stylesheet" type="text/css" href="/static/css/style.css" />
<script src="/static/javascript/jquery.js"></script>
<script src="/static/javascript/public.js"></script>
</head>
<body class="login-page">
	<section class="login-contain">
		<header>
			<h1>B站视频数据采集分析可视化系统</h1>
		</header>
		<div class="form-content">
			<form class="login-form" action="/change_password" method="post">
			<ul>
				<li>
					<div class="form-group">
						<label class="control-label">账号：</label>
						<input type="text" name="name" placeholder="账号..." class="form-control form-underlined"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">原密码：</label>
						<input type="password" name="old_pwd" placeholder="原密码..." class="form-control form-underlined"/>
					</div>
				</li>
				<li>
					<div class="form-group">
						<label class="control-label">新密码：</label>
						<input type="password" name="new_pwd" placeholder="新密码（至少6位）..." class="form-control form-underlined"/>
					</div>
				</li>
				{% if error %}
				<li>
					<p style="color:#e85d5d;text-align:center;font-size:14px;">{{ error }}</p>
				</li>
				{% endif %}
				{% if success %}
				<li>
					<p style="color:#4caf50;text-align:center;font-size:14px;">{{ success }}</p>
				</li>
				{% endif %}
				<li>
					<button class="btn btn-lg btn-block" type="submit">确认修改</button>
				</li>
				<li>
					<p class="btm-info"><a href="/login">返回登录</a></p>
				</li>
			</ul>
			</form>
		</div>
	</section>
<div class="mask"></div>
</body>
</html>
