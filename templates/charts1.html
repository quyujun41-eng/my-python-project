{% extends 'base.html' %}
{% block title %}分析可视化{% endblock %}

{% block content %}
<div class="container-fluid">

  <!-- 页面 Banner -->
  <div class="page-banner">
    <div class="page-banner-icon"><i class="fa fa-bar-chart"></i></div>
    <div>
      <div class="page-banner-title">视频数据分析可视化</div>
      <div class="page-banner-sub">视频类型分区 · 播放趋势 · 数据洞察</div>
    </div>
  </div>

  <!-- 分区标签 -->
  <div class="type-filters">
    <a href="/echarts1" class="type-tag{% if not request.args.get('type1') %} active{% endif %}">全部</a>
    {% for resu in types %}
    <a href="/echarts1?type1={{resu}}" class="type-tag{% if request.args.get('type1') == resu %} active{% endif %}">{{ resu }}</a>
    {% endfor %}
  </div>

  <!-- 图表区 -->
  <div class="row">
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
      <div class="card mb-3">
        <div class="card-header"><i class="fa fa-bar-chart"></i> 播放量前20视频柱状图</div>
        <div class="card-body" id="app1" style="height:300px;width:100%"></div>
      </div>
    </div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
      <div class="card mb-3">
        <div class="card-header"><i class="fa fa-line-chart"></i> 粉丝数前10的视频类型折线图</div>
        <div class="card-body" id="app2" style="height:300px;width:100%"></div>
      </div>
    </div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
      <div class="card mb-3">
        <div class="card-header"><i class="fa fa-table"></i> 播放量等级与视频时长箱线图</div>
        <div class="card-body" id="app3" style="height:300px;width:100%"></div>
      </div>
    </div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
      <div class="card mb-3">
        <div class="card-header"><i class="fa fa-circle-o"></i> 播放量与粉丝数关系散点图</div>
        <div class="card-body" id="app4" style="height:300px;width:100%"></div>
      </div>
    </div>
    <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
      <div class="card mb-3">
        <div class="card-header"><i class="fa fa-search"></i> 用户热门搜索关键词 Top10</div>
        <div class="card-body" id="app_search" style="height:300px;width:100%"></div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block script %}
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
var domScatter = document.getElementById("app4");
var scatterChart = echarts.init(domScatter);
scatterChart.setOption({
  tooltip: { formatter: function(p){ var v=p.value; return '播放量：'+v[0]+'<br/>粉丝数：'+v[1]+'<br/>标题：'+v[2]; } },
  grid: { left:'3%', right:'4%', bottom:'15%', top:'5%', containLabel:true },
  xAxis: { name:'播放量', type:'value' },
  yAxis: { name:'粉丝数', type:'value' },
  series: [{ symbolSize:8, data:{{ score_time|safe }}, type:'scatter', itemStyle:{ color:'#6366f1', opacity:0.7 } }]
});
</script>
<script>
echarts.init(document.getElementById("app_search")).setOption({
  tooltip: { trigger:'axis', axisPointer:{ type:'shadow' } },
  grid: { left:'3%', right:'4%', bottom:'3%', containLabel:true },
  xAxis: [{ type:'category', data:{{ hot_kw_names|safe }}, axisTick:{ alignWithLabel:true }, axisLabel:{ rotate:30 } }],
  yAxis: [{ type:'value', name:'搜索次数' }],
  series: [{ name:'搜索次数', type:'bar', barWidth:'50%', data:{{ hot_kw_counts|safe }}, itemStyle:{ color:'#e85d5d' } }]
});
</script>
<script>
echarts.init(document.getElementById("app1")).setOption({
  tooltip: { trigger:'axis', axisPointer:{ type:'shadow' } },
  grid: { left:'3%', right:'4%', bottom:'3%', containLabel:true },
  xAxis: [{ type:'category', data:{{ rank_score_name|safe }}, axisTick:{ alignWithLabel:true } }],
  yAxis: [{ type:'value' }],
  series: [{ name:'播放量', type:'bar', barWidth:'60%', data:{{ rank_score_count|safe }}, itemStyle:{ color:'#6366f1' } }]
});
</script>
<script>
echarts.init(document.getElementById("app2")).setOption({
  tooltip: { trigger:'axis', axisPointer:{ type:'shadow' } },
  grid: { left:'3%', right:'4%', bottom:'3%', containLabel:true },
  xAxis: [{ type:'category', data:{{ author_name|safe }}, axisTick:{ alignWithLabel:true } }],
  yAxis: [{ type:'value' }],
  series: [{ name:'粉丝数', type:'line', data:{{ author_count|safe }}, itemStyle:{ color:'#8b5cf6' } }]
});
</script>
<script>
echarts.init(document.getElementById("app3")).setOption({
  title: [{ text:'' }],
  dataset: [
    { source:{{ li1|safe }} },
    { transform:{ type:'boxplot', config:{ itemNameFormatter:'播放等级 {value}' } } },
    { fromDatasetIndex:1, fromTransformResult:1 }
  ],
  tooltip: { trigger:'item', axisPointer:{ type:'shadow' } },
  grid: { left:'10%', right:'10%', bottom:'15%' },
  xAxis: { type:'category', boundaryGap:true, splitArea:{ show:false }, splitLine:{ show:false } },
  yAxis: { type:'value', splitArea:{ show:true } },
  series: [{ name:'时长', type:'boxplot', datasetIndex:1 }]
});
</script>
{% endblock %}
