<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>{% block title %}B站视频数据采集分析可视化系统{% endblock %}</title>
<meta name="renderer" content="webkit">
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" type="text/css" href="/static/css/style.css" />
<script src="/static/javascript/jquery.js"></script>
<script src="/static/javascript/plug-ins/customScrollbar.min.js"></script>
<script src="/static/javascript/plug-ins/echarts.min.js"></script>
<script src="/static/javascript/plug-ins/layerUi/layer.js"></script>
<script src="/static/javascript/plug-ins/pagination.js"></script>
<script src="/static/javascript/public.js"></script>
<link href="/static/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
<link href="/static/assets/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css" />
<link href="/static/assets/css/style.css" rel="stylesheet" type="text/css" />
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.16/css/dataTables.bootstrap4.min.css"/>
<style>
:root {
  --primary: #6366f1; --pri-dark: #4f46e5;
  --pri-light: #e0e7ff; --bg: #f0f2f8;
  --border: #e5e7eb; --text: #111827; --muted: #6b7280;
  --sb-w: 230px;
}

body { background: var(--bg) !important; font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif !important; }

/* ── 侧边栏 ── */
.side-nav {
  background: #111827 !important;
  border-right: none !important;
  padding: 0 !important;
  width: var(--sb-w) !important;
}

/* Logo 区域 */
.side-logo {
  position: relative !important;
  background: #111827 !important;
  padding: 18px 16px 14px !important;
  height: auto !important;
  line-height: normal !important;
  border-bottom: 1px solid rgba(255,255,255,.07) !important;
}
.side-logo .logo {
  display: flex !important; flex-direction: column !important; align-items: flex-start !important;
}
.side-logo .logo-ico {
  width: 38px !important; height: 38px !important;
  background: linear-gradient(135deg,#6366f1,#8b5cf6) !important;
  border-radius: 10px !important; margin-bottom: 10px !important;
  display: flex !important; align-items: center !important; justify-content: center !important;
}
.side-logo .logo-ico i { display: none !important; }
.side-logo .logo-ico::after { content: '🎬'; font-size: 18px; display: block; }
.side-logo .logo strong {
  color: #fff !important; font-size: 13px !important; font-weight: 700 !important;
}

/* 导航菜单 */
.side-menu { padding: 10px 8px !important; background: #111827 !important; }
.side-menu h2 { margin: 0 !important; padding: 0 !important; font-size: inherit !important; font-weight: normal !important; border: none !important; background: none !important; }
.side-menu h2 a {
  display: flex !important; align-items: center !important; gap: 9px !important;
  padding: 9px 12px !important; margin-bottom: 2px !important;
  border-radius: 9px !important; font-size: 13px !important;
  color: rgba(255,255,255,.6) !important; text-decoration: none !important;
  transition: all .15s !important; font-weight: 500 !important;
  background: transparent !important;
}
.side-menu h2 a:hover { background: rgba(255,255,255,.08) !important; color: #fff !important; }
.side-menu h2 a.active-menu { background: rgba(99,102,241,.2) !important; color: #a5b4fc !important; }
.side-menu h2 a i { width: 20px !important; text-align: center !important; font-size: 14px !important; flex-shrink: 0 !important; }

/* ── 顶部 header ── */
.top-hd {
  background: #fff !important;
  border-bottom: 1px solid var(--border) !important;
  box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
  height: 52px !important;
  display: flex !important; align-items: center !important;
  padding: 0 20px 0 calc(var(--sb-w) + 20px) !important;
  z-index: 10 !important;
}
.top-hd .hd-lt a { color: #374151 !important; font-size: 18px !important; }
.top-hd .hd-rt { margin-left: auto !important; }
.top-hd .hd-rt ul { margin: 0 !important; padding: 0 !important; list-style: none !important; display: flex !important; align-items: center !important; gap: 8px !important; }
.top-hd .hd-rt li { margin: 0 !important; }

/* 用户名胶囊 */
.hd-username {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 12px 3px 4px;
  background: #f3f4f6;
  border-radius: 20px;
  font-size: 13px; font-weight: 500; color: var(--text);
  border: 1px solid var(--border);
}
.hd-avatar {
  width: 26px; height: 26px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}

/* 退出按钮 */
.hd-signout {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 7px;
  font-size: 13px; font-weight: 500;
  color: var(--muted) !important;
  text-decoration: none !important;
  background: transparent;
  transition: all .15s;
}
.hd-signout:hover {
  background: #fef2f2 !important;
  color: #ef4444 !important;
  text-decoration: none !important;
}

/* ── 内容区 ── */
.content-wrap { background: var(--bg) !important; }
.main-cont {
  background: var(--bg) !important;
  padding-left: calc(var(--sb-w) + 5px) !important;
}
.main-cont::-webkit-scrollbar { width: 4px; }
.main-cont::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
.page-wrap { padding: 20px 24px !important; background: transparent !important; }

/* ── 页面标题区 ── */
.page-hd header { background: transparent !important; padding: 0 0 12px !important; border: none !important; }
.page-hd .title { font-size: 17px !important; font-weight: 700 !important; color: var(--text) !important; }
.page-hd hr { border-color: var(--border) !important; margin: 0 0 18px !important; }

/* ── Cards ── */
.card { border: 1px solid var(--border) !important; border-radius: 12px !important; box-shadow: 0 2px 10px rgba(0,0,0,.05) !important; }
.card-header { background: #fff !important; border-bottom: 1px solid var(--border) !important; padding: 12px 18px !important; font-weight: 600 !important; color: var(--text) !important; border-radius: 12px 12px 0 0 !important; }
.card-body { background: #fff !important; border-radius: 0 0 12px 12px !important; }

/* ── Tables ── */
.table { background: #fff !important; font-size: 13px !important; }
.table thead th { background: #6366f1 !important; color: #fff !important; border: none !important; padding: 10px 12px !important; font-weight: 600 !important; white-space: nowrap !important; }
.table tbody tr:hover td { background: #ede9fe !important; }
.table td { padding: 9px 12px !important; border-color: var(--border) !important; vertical-align: middle !important; }
.table-bordered { border: 1px solid var(--border) !important; }
.table a { color: var(--primary) !important; }

/* ── Forms ── */
.form-control { border-radius: 8px !important; border: 1.5px solid var(--border) !important; font-size: 13px !important; padding: 7px 12px !important; transition: border .2s !important; }
.form-control:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(99,102,241,.1) !important; outline: none !important; }
.input-group .btn { background: var(--primary) !important; color: #fff !important; border: none !important; border-radius: 0 8px 8px 0 !important; padding: 7px 18px !important; }
.input-group .btn:hover { background: var(--pri-dark) !important; }
.btn-secondary-outline { background: var(--primary) !important; color: #fff !important; border: none !important; border-radius: 8px !important; padding: 7px 18px !important; }
.btn-secondary-outline:hover { background: var(--pri-dark) !important; color: #fff !important; }

/* ── 分区标签 ── */
.type-filters { display: flex; flex-wrap: wrap; gap: 7px; padding: 4px 0 18px; }
.type-tag {
  display: inline-flex; align-items: center;
  padding: 5px 15px; border-radius: 20px;
  font-size: 12.5px; font-weight: 500;
  text-decoration: none !important;
  color: var(--primary); background: #ede9fe;
  border: 1.5px solid transparent; transition: all .15s; line-height: 1.3;
}
.type-tag:hover { background: var(--primary); color: #fff; }
.type-tag.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,.3); }

/* ── Section icons ── */
h2.title i, h2.title .fa { color: var(--primary) !important; margin-right: 6px !important; }

/* ══ 页面 Banner ══ */
.page-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,.04);
}
.page-banner-icon {
  font-size: 20px;
  color: var(--primary);
  flex-shrink: 0;
  width: 36px; height: 36px;
  background: var(--pri-light);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.page-banner-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.page-banner-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}
</style>
</head>
<body>
<div class="main-wrap">

  <!-- 侧边栏 -->
  <div class="side-nav">
    <div class="side-logo">
      <div class="logo">
        <span class="logo-ico"></span>
        <strong>B站数据分析系统</strong>
        <span style="font-size:11px;color:rgba(255,255,255,.3);margin-top:3px;">采集 · 分析 · 可视化</span>
      </div>
    </div>
    <nav class="side-menu content mCustomScrollbar" data-mcs-theme="minimal-dark">
      <h2><a href="/index"   class="InitialPage"><i class="fa fa-table"></i>数据查看</a></h2>
      <h2><a href="/tuijian" class="InitialPage"><i class="fa fa-star"></i>算法推荐</a></h2>
      <h2><a href="/echarts1" class="InitialPage"><i class="fa fa-bar-chart"></i>分析可视化</a></h2>
      <h2><a href="/analysis" class="InitialPage"><i class="fa fa-search"></i>关键字分析</a></h2>
      <h2><a href="/crawl"   class="InitialPage"><i class="fa fa-refresh"></i>数据更新</a></h2>
      <h2><a href="/admin"   class="InitialPage"><i class="fa fa-cog"></i>后台管理</a></h2>

      <div style="margin-top:20px;padding:0 4px;">
        <div style="height:1px;background:rgba(255,255,255,.06);margin-bottom:14px;"></div>
        <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin-bottom:8px;">系统状态</div>
        <div style="padding:0 8px;font-size:12px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:6px;">
          <span style="width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 5px #34d39960;flex-shrink:0;"></span>
          服务运行中
        </div>
      </div>
    </nav>
  </div>

  <!-- 主区域 -->
  <div class="content-wrap">
    <header class="top-hd">
      <div class="hd-lt">
        <a class="icon-reorder"></a>
      </div>
      <div class="hd-rt">
        <ul>
          {% if current_username %}
          <li>
            <span class="hd-username">
              <span class="hd-avatar">{{ current_username[0]|upper if current_username else 'U' }}</span>
              {{ current_username }}
            </span>
          </li>
          {% endif %}
          <li>
            <a href="#" id="JsSignOut" class="hd-signout">
              <i class="fa fa-sign-out"></i> 退出
            </a>
          </li>
        </ul>
      </div>
    </header>

    <main class="main-cont content mCustomScrollbar">
      <div class="page-wrap">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</div>

<script type="text/javascript">
// 高亮当前菜单项
(function(){
  var path = window.location.pathname;
  document.querySelectorAll('.side-menu h2 a').forEach(function(a){
    var href = a.getAttribute('href');
    if(href && (path === href || path.startsWith(href + '?') || path.startsWith(href + '/')))
      a.classList.add('active-menu');
  });
})();

$(function(){
  // 退出确认
  $('#JsSignOut').click(function(e){
    e.preventDefault();
    layer.confirm('确定退出登录？', {
      title: '系统提示',
      btn: ['确定','取消']
    }, function(){
      location.href = '/loginout';
    });
  });

  // Tab选项卡
  $('.tab-nav li').click(function(){
    var liIndex = $('.tab-nav li').index(this);
    $(this).addClass('active').siblings().removeClass('active');
    $('.tab-cont').eq(liIndex).fadeIn().siblings('.tab-cont').hide();
  });

  // Button下拉菜单
  $('.btn-drop-group .btn').click(function(e){
    $(this).siblings('.drop-list').show();
    $(this).parent().siblings().find('.drop-list').hide();
    $(document).one('click', function(){
      $('.btn-drop-group .drop-list').hide();
    });
    e.stopPropagation();
  });
  $('.btn-drop-group .drop-list li').click(function(){
    $(this).parent().parent().hide();
  });

  // 侧边栏收缩
  $('.top-hd .hd-lt').click(function(){
    $('.side-nav').toggleClass('hide');
    $('.top-hd,.main-cont,.btm-ft').toggleClass('switchMenu');
    $('.top-hd .hd-lt a').toggleClass('icon-exchange');
    localStorage.setItem('setLayOut1','hide');
    localStorage.setItem('setLayOut2','switchMenu');
    localStorage.setItem('setLayOut3','icon-exchange');
    if(!$('.side-nav').hasClass('hide')){
      localStorage.removeItem('setLayOut1');
      localStorage.removeItem('setLayOut2');
      localStorage.removeItem('setLayOut3');
    }
  });
  $('.side-nav').addClass(localStorage.getItem('setLayOut1'));
  $('.top-hd,.main-cont,.btm-ft').addClass(localStorage.getItem('setLayOut2'));
  $('.top-hd .hd-lt a').addClass(localStorage.getItem('setLayOut3'));
});

function Page(iAbsolute,sTableId,sTBodyId,sPageId){
  this.absolute=iAbsolute;this.tableId=sTableId;this.tBodyId=sTBodyId;
  this.rowCount=0;this.pageCount=0;this.pageIndex=0;
  this.__oTable__=null;this.__oTBody__=null;this.__dataRows__=0;
  this.pageId=sPageId;this.__init__();
}
Page.prototype.__init__=function(){
  this.__oTable__=document.getElementById(this.tableId);
  this.__oTBody__=this.__oTable__.tBodies[this.tBodyId];
  this.__pageInnerDiv__=document.getElementById(this.pageId);
  this.__dataRows__=this.__oTBody__.rows;this.rowCount=this.__dataRows__.length;
  try{
    this.absolute=(this.absolute<=0)||(this.absolute>this.rowCount)?this.rowCount:this.absolute;
    this.pageCount=parseInt(this.rowCount%this.absolute==0?this.rowCount/this.absolute:this.rowCount/this.absolute+1);
  }catch(e){}
  this.__updateTableRows__();
};
Page.prototype.nextPage=function(){if(this.pageIndex+1<this.pageCount){this.pageIndex+=1;this.__updateTableRows__();}};
Page.prototype.prePage=function(){if(this.pageIndex>=1){this.pageIndex-=1;this.__updateTableRows__();}};
Page.prototype.firstPage=function(){if(this.pageIndex!=0){this.pageIndex=0;this.__updateTableRows__();}};
Page.prototype.lastPage=function(){if(this.pageIndex+1!=this.pageCount){this.pageIndex=this.pageCount-1;this.__updateTableRows__();}};
Page.prototype.aimPage=function(i){this.pageIndex=i>this.pageCount-1?this.pageCount-1:i<0?0:i;this.__updateTableRows__();};
Page.prototype.__updateTableRows__=function(){
  var cur=this.absolute*this.pageIndex;
  var more=this.absolute+cur>this.rowCount?this.absolute+cur-this.rowCount:0;
  var tmp=this.__cloneRows__();
  this.__oTable__.removeChild(this.__oTBody__);
  var nb=document.createElement("TBODY");nb.setAttribute("id",this.tBodyId);
  for(var i=cur;i<this.absolute+cur-more;i++)nb.appendChild(tmp[i]);
  this.__oTable__.appendChild(nb);
  this.__dataRows__=tmp;this.__oTBody__=nb;
  document.getElementById(this.pageId).innerHTML="当前页："+(this.pageIndex+1);
  document.getElementById('pageindex1').innerHTML="总页数："+(this.pageCount);
};
Page.prototype.__cloneRows__=function(){
  var t=[];
  for(var i=0;i<this.__dataRows__.length;i++)t[i]=this.__dataRows__[i].cloneNode(1);
  return t;
};
</script>
{% block script %}{% endblock %}
</body>
</html>
